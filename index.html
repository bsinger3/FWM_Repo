      <form id="f">

    <script src="./config.js"></script>
    <script type="text/javascript">
      if (window.SOVRN_COMMERCE_API_KEY) {
        window.vglnk = {
          key: window.SOVRN_COMMERCE_API_KEY,
          enabled: Boolean(window.SOVRN_COMMERCE?.enabled),
          reaffiliate: Boolean(window.SOVRN_COMMERCE?.reaffiliate),
        };

        (function (d, t) {
          var s = d.createElement(t);
          s.type = "text/javascript";
          s.async = true;
          s.src = "https://cdn.viglink.com/api/vglnk.js";
          var r = d.getElementsByTagName(t)[0];
          r.parentNode.insertBefore(s, r);
        })(document, "script");
      }
    </script>
    <script type="module">
        /// <reference path="./database.types.ts" />
      import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";
      const sb = createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);
      function getOrCreateAnonId() {
        let id = localStorage.getItem("fwm_anon_id");
        if (!id) {
          id = crypto.randomUUID();
          localStorage.setItem("fwm_anon_id", id);
        }
        return id;
      }

      const FWM_ANON_ID = getOrCreateAnonId();
      function getOrCreateSessionId() {
        let id = sessionStorage.getItem("fwm_session_id");
        if (!id) {
          id = crypto.randomUUID();
          sessionStorage.setItem("fwm_session_id", id);
        }
        return id;
      }

      const FWM_SESSION_ID = getOrCreateSessionId();

      function getSovrnCommerceConfig() {
        const defaults = {
          key: "",
          enabled: false,
          reaffiliate: false,
          cuidFromAnonId: true,
          preferPlainProductUrls: true,
          useDynamicOpen: true,
        };

        return {
          ...defaults,
          ...(window.SOVRN_COMMERCE || {}),
        };
      }

      function installSovrnCommerce() {
        const config = getSovrnCommerceConfig();
        if (!config.key) return;

        window.vglnk = {
          ...(window.vglnk || {}),
          key: config.key,
          enabled: Boolean(config.enabled),
          reaffiliate: Boolean(config.reaffiliate),
        };

        if (config.cuidFromAnonId) {
          window.vglnk.cuid = FWM_ANON_ID;
        } else if (config.cuid) {
          window.vglnk.cuid = config.cuid;
        }
      }

      installSovrnCommerce();

      function getUtmParams() {
        const p = new URLSearchParams(window.location.search);
        const utm = {
          utm_source: p.get("utm_source"),
          utm_medium: p.get("utm_medium"),
          utm_campaign: p.get("utm_campaign"),
          utm_content: p.get("utm_content"),
        };

        // If no UTMs in the current URL, try the last saved ones
        if (!utm.utm_source && sessionStorage.getItem("fwm_utm_source")) {
          return {
            utm_source: sessionStorage.getItem("fwm_utm_source"),
            utm_medium: sessionStorage.getItem("fwm_utm_medium"),
            utm_campaign: sessionStorage.getItem("fwm_utm_campaign"),
            utm_content: sessionStorage.getItem("fwm_utm_content"),
          };
        }

        // Save UTMs for the rest of this tab session
        sessionStorage.setItem("fwm_utm_source", utm.utm_source || "");
        sessionStorage.setItem("fwm_utm_medium", utm.utm_medium || "");
        sessionStorage.setItem("fwm_utm_campaign", utm.utm_campaign || "");
        sessionStorage.setItem("fwm_utm_content", utm.utm_content || "");

        return utm;
      }

      const FWM_UTM = getUtmParams();

      const f = document.getElementById("f");
      const out = document.getElementById("out");
      const sidebar = document.getElementById("sidebar");
      const toggleBtn = document.getElementById("toggle");
      const mainContent = document.getElementById("main");
      const resultCountContainer = document.getElementById("result-count-container");
      const measurementFieldIds = {
        height: ["h-ft", "h-in"],
        weight: ["w"],
        bust: ["b"],
        waist: ["waist"],
        hips: ["p"],
      };

      let currentSearchParams = null;
      let currentSearchEventId = null;
      let currentOffset = 0;
      let isLoading = false;
      let hasMore = true;
      let totalResultCount = 0;
      let supportsCupSizeRpc = true;
      let supportsCupSizeSearchRpc = true;
      const trackedProductCardImpressions = new Set();
      const trackedProductCardViews = new Set();
      const productCardViewObserver =
        "IntersectionObserver" in window
          ? new IntersectionObserver(
              (entries) => {
                entries.forEach((entry) => {
                  if (!entry.isIntersecting || entry.intersectionRatio < 0.5) {
                    return;
                  }

                  const target = entry.target;
                  productCardViewObserver.unobserve(target);
                  const event = target.__fwmViewEvent;
                  const viewKey = target.__fwmViewKey;
                  if (!event || !viewKey || trackedProductCardViews.has(viewKey)) {
                    return;
                  }

                  trackedProductCardViews.add(viewKey);
                  trackProductCardEventPayload(event);
                });
              },
              {
                root: mainContent,
                threshold: 0.5,
              },
            )
          : null;

      async function fetchLegacyMatchesWithOptionalCupFilter() {
        const normalizedSearchCupSize = currentSearchParams?.in_cup_size
          ? normalizeCupSize(currentSearchParams.in_cup_size)
          : null;
        const requestedLimit = 24;
        const legacyBatchSize = normalizedSearchCupSize ? 100 : requestedLimit;
        let fetchOffset = currentOffset;
        let reachedEnd = false;
        let collected = [];
        let lastError = null;

        while (collected.length < requestedLimit && !reachedEnd) {
          const legacyBody = {
            in_clothing_type_id: currentSearchParams.in_clothing_type_id || null,
            in_height: currentSearchParams.in_height,
            in_hips: currentSearchParams.in_hips,
            in_weight: currentSearchParams.in_weight,
            in_bust: currentSearchParams.in_bust,
            in_waist: currentSearchParams.in_waist,
            require_height: currentSearchParams.require_height,
            require_hips: currentSearchParams.require_hips,
            require_weight: currentSearchParams.require_weight,
            require_bust: currentSearchParams.require_bust,
            require_waist: currentSearchParams.require_waist,
            limit_n: legacyBatchSize,
            offset_n: fetchOffset,
          };

          const legacyResponse = await sb.rpc("match_by_measurements", legacyBody);
          const rawRows = legacyResponse.data || [];
          lastError = legacyResponse.error;

          if (lastError) {
            return {
              data: null,
              error: lastError,
              nextOffset: fetchOffset,
              hasMoreAfterPage: false,
            };
          }

          fetchOffset += rawRows.length;
          if (rawRows.length < legacyBatchSize) {
            reachedEnd = true;
          }

          const filteredRows = normalizedSearchCupSize
            ? rawRows.filter(
                (row) =>
                  normalizeCupSize(row.cupsize_display) === normalizedSearchCupSize,
              )
            : rawRows;

          collected = collected.concat(filteredRows);
        }

        return {
          data: collected.slice(0, requestedLimit),
          error: null,
          nextOffset: fetchOffset,
          hasMoreAfterPage: !reachedEnd,
        };
      }

      // Update result count display
      function updateResultCount(count, hasMoreResults) {
        if (count === null || count === undefined) {
          resultCountContainer.innerHTML = "";
          return;
        }

        if (count === 0) {
          resultCountContainer.innerHTML = `<div class="result-count">Found <strong>0 results</strong></div>`;
          return;
        }

        const countText = count === 1 ? "1 result" : `${count.toLocaleString()} results`;
        const moreText = hasMoreResults ? "+" : "";
        resultCountContainer.innerHTML = `<div class="result-count">Found <strong>${countText}${moreText}</strong></div>`;
      }

      // Load clothing types
      async function loadClothingTypes() {
        const { data, error } = await sb
          .from("clothing_types")
          .select("id, label, sort_order")
          .order("sort_order", { ascending: true });

        if (!error && data) {
          const select = document.getElementById("clothing-type");
          data.forEach((ct) => {
            const option = document.createElement("option");
            option.value = ct.id;
            option.textContent = ct.label;
            select.appendChild(option);
          });
        }
      }

      loadClothingTypes();

      function normalizeCupSize(value) {
        return value ? value.trim().toUpperCase() : "";
      }

      async function loadCupSizes(query = "") {
        const normalizedQuery = normalizeCupSize(query);
        let cupSizes = [];

        if (supportsCupSizeRpc) {
          const { data, error } = await sb.rpc("get_distinct_cup_sizes", {
            prefix_text: normalizedQuery || null,
            limit_n: 20,
          });

          if (error) {
            console.error("Error loading cup sizes via RPC:", error);
            supportsCupSizeRpc = false;
          } else {
            cupSizes = (data || []).map((row) => row.cup_size);
          }
        }

        if (!supportsCupSizeRpc) {
          let queryBuilder = sb
            .from("images")
            .select("cupsize_display")
            .not("cupsize_display", "is", null)
            .neq("cupsize_display", "")
            .neq("cupsize_display", "unknown")
            .limit(200);

          if (normalizedQuery) {
            queryBuilder = queryBuilder.ilike(
              "cupsize_display",
              `${normalizedQuery}%`,
            );
          }

          const { data, error } = await queryBuilder;
          if (error) {
            console.error("Error loading cup sizes from images:", error);
            return;
          }

          cupSizes = Array.from(
            new Set(
              (data || [])
                .map((row) => normalizeCupSize(row.cupsize_display))
                .filter(Boolean),
            ),
          )
            .sort()
            .slice(0, 20);
        }

        const dataList = document.getElementById("cup-size-options");
        dataList.innerHTML = "";

        cupSizes.forEach((cupSize) => {
          const option = document.createElement("option");
          option.value = cupSize;
          dataList.appendChild(option);
        });
      }

      const cupSizeInput = document.getElementById("cup-size");

      // Load random results on initial page load

      // Load random results when page loads

      // Infinite scroll
      mainContent.addEventListener("scroll", async () => {
        if (isLoading || !hasMore || !currentSearchParams) return;

        const scrollTop = mainContent.scrollTop;
        const scrollHeight = mainContent.scrollHeight;
        const clientHeight = mainContent.clientHeight;

        // Load more when user is 500px from bottom

          utm_content: sessionStorage.getItem("fwm_utm_content") || null,
        };
      }
      f.addEventListener("submit", async (e) => {
        e.preventDefault();
        console.log("SUBMIT HANDLER FIRED");

        // Collapse sidebar on search
        sidebar.classList.add("collapsed");
        toggleBtn.classList.add("collapsed");
        mainContent.classList.add("expanded");
        toggleBtn.textContent = "🔍";

        // Calculate total height in inches from feet and inches
        const feetVal = num(document.getElementById("h-ft").value);
        const inchesVal = num(document.getElementById("h-in").value);

        const waistVal = num(document.getElementById("waist").value);

          require_weight:

          require_bust:

            document.getElementById("require-bust").checked,
          require_waist:
            document.getElementById("waist").value !== "" &&

        };
        const utm = parseUtmFromStorage();

        const { error } = await sb.from("search_events").insert({

        console.log("search_events id", currentSearchEventId);
        if (error) console.error("search_events insert error", error);
        console.log("AFTER INSERT", { currentSearchEventId });

        const clothingTypeId = document.getElementById("clothing-type").value;

        // Reset for new search
        currentOffset = 0;
        hasMore = true;
        totalResultCount = 0;
        out.innerHTML = "";
        updateResultCount(null); // Clear count while loading

        await loadMore();
      });

      async function loadMore() {
        if (isLoading || !hasMore) return;

        isLoading = true;

        // Show loading indicator
        const loadingDiv = document.createElement("div");
        loadingDiv.textContent = "Loading...";
        loadingDiv.style.gridColumn = "1 / -1";
        loadingDiv.style.textAlign = "center";
        loadingDiv.style.padding = "20px";
        loadingDiv.id = "loading-indicator";
        out.appendChild(loadingDiv);

        const body = {
          ...currentSearchParams,
          limit_n: 24,
          offset_n: currentOffset,
        };

        console.log("Request body:", body);

        const searchStart = performance.now();
        let data;
        let error;

        if (supportsCupSizeSearchRpc) {
          const response = await sb.rpc("match_by_measurements", body);
          data = response.data;
          error = response.error;

          if (
            error &&
            error.message &&
            error.message.includes(
              "Could not find the function public.match_by_measurements",
            )
          ) {
            console.warn(
              "Falling back to legacy match_by_measurements signature without cup size.",
            );
            supportsCupSizeSearchRpc = false;
          }
        }

        let nextOffset = currentOffset;
        let hasMoreAfterPage = true;

        if (!supportsCupSizeSearchRpc) {
          const legacyResponse = await fetchLegacyMatchesWithOptionalCupFilter();
          data = legacyResponse.data;
          error = legacyResponse.error;
          nextOffset = legacyResponse.nextOffset;
          hasMoreAfterPage = legacyResponse.hasMoreAfterPage;
        }

        const latencyMs = Math.round(performance.now() - searchStart);

        // Remove loading indicator
        const indicator = document.getElementById("loading-indicator");
        if (indicator) indicator.remove();

        console.log("Response data:", data);
        console.log("Response error:", error);

        if (currentSearchEventId) {
          const resultsCount = Array.isArray(data) ? data.length : 0;

          const payload = {
            results_count: resultsCount,
            latency_ms: latencyMs,
          };

          console.log("CALLING update_search_event_metrics", {
            currentSearchEventId,
            payload,
          });
          const { error: updErr } = await sb.rpc(
            "update_search_event_metrics",
            {
              p_id: currentSearchEventId,
              p_results_count: payload.results_count,
              p_latency_ms: payload.latency_ms,
            },
          );

          if (updErr) console.error("search_events update error", updErr);
        }

        if (error) {
          out.textContent = "Error: " + error.message;
          console.error("API Error:", error);
          isLoading = false;
          return;
        }

        if (!data || data.length === 0) {
          hasMore = false;
          if (currentOffset === 0) {
            out.textContent = "No matches";
            updateResultCount(0, false);
          }
        } else {
          // Filter out records with unknown/missing size before rendering
          const filtered = data.filter((r) => {
            const hasSize =
              r.size_display &&
              r.size_display.toLowerCase() !== "unknown" &&
              r.size_display !== "";
            const hasImage = r.original_url_display;
            const hasBodyMeasurement =
              r.height_in_display ||
              r.weight_display_display ||
              r.bust_in_number_display ||
              r.hips_in_display ||
              r.waist_in;
            const hasLink = getProductUrl(r);
            return hasSize && hasImage && hasBodyMeasurement && hasLink;
          });

          if (filtered.length > 0) {
            render(filtered, true); // true = append mode
            if (supportsCupSizeSearchRpc) {
              currentOffset += data.length;
            } else {
              currentOffset = nextOffset;
            }

            // Update the total count based on cards currently displayed
            const displayedCards = out.querySelectorAll('.card').length;
            totalResultCount = displayedCards;
          }

          if (supportsCupSizeSearchRpc && data.length < 24) {
            hasMore = false;
          }

          if (!supportsCupSizeSearchRpc && !hasMoreAfterPage) {
            hasMore = false;
          }

          // Update result count display
          updateResultCount(totalResultCount, hasMore);
        }

        isLoading = false;
      }

      function render(rows, append = false) {
        console.log("=== RENDER FUNCTION CALLED ===");
        console.log("Rows received:", rows ? rows.length : 0);
        console.log("Append mode:", append);

        if (!append) {
          out.innerHTML = "";
        }
        if (!rows || rows.length === 0) {
          if (!append) {
            out.textContent = "No matches";
          }
          return;
        }

        let displayed = 0;
        let skipped = 0;
        const baseCardPosition = append ? out.querySelectorAll(".card").length : 0;
        const impressionEvents = [];

        for (const r of rows) {
          const hasSize =
            r.size_display &&
            r.size_display.toLowerCase() !== "unknown" &&
            r.size_display !== "";
          const hasImage = r.original_url_display;
          const hasBodyMeasurement =
            r.height_in_display ||
            r.weight_display_display ||
            r.bust_in_number_display ||
            r.hips_in_display ||
            r.waist_in;
          const hasLink = getProductUrl(r);

          if (!hasSize || !hasImage || !hasBodyMeasurement || !hasLink) {
            skipped++;
            console.log(`Skip #${skipped}:`, {
              hasSize,
              hasImage,
              hasBodyMeasurement,
              hasLink,
              size: r.size_display,
              image: r.original_url_display ? "yes" : "no",
              link: getProductUrl(r) ? "yes" : "no",
            });
            continue;
          }

          displayed++;
          const cardPosition = baseCardPosition + displayed;

          const a = document.createElement("a");
          a.className = "card";
          const productUrl = getProductUrl(r);
          a.href = productUrl;
          a.target = "_blank";
          a.rel = "noopener noreferrer sponsored";
          a.addEventListener("click", (e) => {
            trackProductCardEvent("click", r, productUrl, cardPosition);
            maybeOpenWithSovrn(e, productUrl, a.target);
          });

          const img = document.createElement("img");
          img.loading = "lazy";
          img.referrerPolicy = "no-referrer";

          const proxied = window.IMAGE_PROXY
            ? window.IMAGE_PROXY + encodeURIComponent(r.original_url_display)
            : null;

          img.src = proxied || r.original_url_display;

          img.onerror = () => {
            if (proxied && img.src === proxied && r.original_url_display) {
              img.src = r.original_url_display;
              return;
            }
            img.style.display = "none";
          };

          const meta = document.createElement("div");
          meta.className = "meta";

          function createMetaRow(className = "") {
            const row = document.createElement("div");
            row.className = className ? `meta-row ${className}` : "meta-row";
            return row;
          }

          function appendMetaPill(row, label, value, className = "") {
            if (!value) return;
            const pill = document.createElement("span");
            pill.className = className ? `meta-pill ${className}` : "meta-pill";

            if (label) {
              const labelSpan = document.createElement("span");
              labelSpan.className = "meta-pill-label";
              labelSpan.textContent = label;
              pill.appendChild(labelSpan);
            }

            const valueSpan = document.createElement("span");
            valueSpan.className = className
              ? `meta-pill-value ${className}`
              : "meta-pill-value";
            valueSpan.textContent = value;
            pill.appendChild(valueSpan);

            row.appendChild(pill);
          }

          function appendMetaNode(row, node, label = "") {
            if (!node) return;
            const pill = document.createElement("span");
            pill.className = "meta-pill";

            if (label) {
              const labelSpan = document.createElement("span");
              labelSpan.className = "meta-pill-label";
              labelSpan.textContent = label;
              pill.appendChild(labelSpan);
            }

            pill.appendChild(node);
            row.appendChild(pill);
          }

          function formatWeightText(value) {
            if (!value) return "";
            const raw = String(value).trim();
            if (!raw || raw.toLowerCase() === "unknown") return "";
            const numeric = Number.parseFloat(raw.replace(/[^0-9.]+/g, ""));
            if (!Number.isFinite(numeric)) return raw;
            const formattedNumber = Number.isInteger(numeric)
              ? String(numeric)
              : String(numeric).replace(/\.0+$/, "");
            return /\b(lb|lbs|pound|pounds)\b/i.test(raw)
              ? raw.replace(/\s*(lbs?|pounds?)\b/i, " lb")
              : `${formattedNumber} lb`;
          }

          // Normalize size display
          let sizeText = r.size_display;
          if (sizeText) {
            // Remove "Size Purchased: " or "Size: " prefix if present
            sizeText = sizeText.replace(/^Size Purchased:\s*/i, "");
            sizeText = sizeText.replace(/^Size:\s*/i, "");
          }
          const primaryRow = createMetaRow();
          appendMetaPill(primaryRow, "Size", sizeText);
          if (r.color_display && r.color_display.toLowerCase() !== "unknown") {
            appendMetaPill(primaryRow, "", r.color_display);
          }

          const summaryRow = createMetaRow();
          if (r.height_in_display) {
            const h = Number(r.height_in_display);
            const feet = Math.floor(h / 12);
            const inches = Math.round(h % 12);
            const heightText = `${feet}'${inches}"`;
            const isHeightMatch =
              currentSearchParams?.in_height !== null &&
              currentSearchParams?.in_height !== undefined &&
              Number(currentSearchParams.in_height) === h;
            appendMetaPill(
              summaryRow,
              "",
              heightText,
              isHeightMatch ? "match-height" : "",
            );
          }
          if (
            r.weight_display_display &&
            r.weight_display_display.toLowerCase() !== "unknown"
          ) {
            const parsedRowWeight = Number.parseFloat(
              String(r.weight_display_display).replace(/[^0-9.]+/g, ""),
            );
            const normalizedSearchWeight =
              currentSearchParams?.in_weight !== null &&
              currentSearchParams?.in_weight !== undefined
                ? Number(currentSearchParams.in_weight)
                : null;
            const normalizedRowWeight =
              Number.isFinite(parsedRowWeight)
                ? parsedRowWeight
                : null;
            const isWeightMatch =
              normalizedSearchWeight !== null &&
              normalizedRowWeight !== null &&
              normalizedSearchWeight === normalizedRowWeight;
            const weightText = formatWeightText(r.weight_display_display);

            appendMetaPill(
              summaryRow,
              "",
              weightText,
              isWeightMatch ? "match-weight" : "",
            );
          }

          const normalizedSearchCupSize = currentSearchParams?.in_cup_size
            ? currentSearchParams.in_cup_size.trim().toUpperCase()
            : null;
          const normalizedRowCupSize = r.cupsize_display
            ? r.cupsize_display.trim().toUpperCase()
            : null;
          const normalizedSearchBust =
            currentSearchParams?.in_bust !== null &&
            currentSearchParams?.in_bust !== undefined
              ? Number(currentSearchParams.in_bust)
              : null;
          const normalizedRowBust =
            r.bust_in_number_display !== null &&
            r.bust_in_number_display !== undefined
              ? Number(r.bust_in_number_display)
              : null;
          const normalizedSearchWaist =
            currentSearchParams?.in_waist !== null &&
            currentSearchParams?.in_waist !== undefined
              ? Number(currentSearchParams.in_waist)
              : null;
          const normalizedRowWaist = num(r.waist_in);
          const normalizedSearchHips =
            currentSearchParams?.in_hips !== null &&
            currentSearchParams?.in_hips !== undefined
              ? Number(currentSearchParams.in_hips)
              : null;
          const normalizedRowHips =
            r.hips_in_display !== null && r.hips_in_display !== undefined
              ? Number(r.hips_in_display)
              : null;

          // Format bra size as 32DD if both bust and cup size are available
          if (
            r.bust_in_number_display &&
            r.cupsize_display &&
            r.bust_in_number_display.toString().toLowerCase() !== "unknown" &&
            r.cupsize_display.toLowerCase() !== "unknown"
          ) {
            const isBandMatch =
              normalizedSearchBust !== null &&
              normalizedRowBust !== null &&
              normalizedSearchBust === normalizedRowBust;
            const isCupMatch =
              normalizedSearchCupSize &&
              normalizedRowCupSize &&
              normalizedSearchCupSize === normalizedRowCupSize;
            const isBraMatch =
              isBandMatch && isCupMatch;

            const braWrapper = document.createElement("span");
            braWrapper.className = "meta-pill-value";
            if (isBraMatch) {
              braWrapper.classList.add("match-bra");
            }

            const bandSpan = document.createElement("span");
            bandSpan.textContent = `${r.bust_in_number_display}`;
            if (!isBraMatch && isBandMatch) {
              bandSpan.className = "match-bra-partial";
            }

            const cupSpan = document.createElement("span");
            cupSpan.textContent = r.cupsize_display;
            if (!isBraMatch && isCupMatch) {
              cupSpan.className = "match-bra-partial";
            }

            braWrapper.appendChild(bandSpan);
            braWrapper.appendChild(cupSpan);
            appendMetaNode(summaryRow, braWrapper);
          } else if (
            r.bust_in_number_display &&
            r.bust_in_number_display.toString().toLowerCase() !== "unknown"
          ) {
            const bustText = `${r.bust_in_number_display}"`;
            const isBustMatch =
              normalizedSearchBust !== null &&
              normalizedRowBust !== null &&
              normalizedSearchBust === normalizedRowBust;
            appendMetaPill(
              summaryRow,
              "Bust",
              bustText,
              isBustMatch ? "match-bust" : "",
            );
          }

          if (
            r.hips_in_display &&
            r.hips_in_display.toString().toLowerCase() !== "unknown"
          ) {
            const isHipsMatch =
              normalizedSearchHips !== null &&
              normalizedRowHips !== null &&
              normalizedSearchHips === normalizedRowHips;
            appendMetaPill(
              summaryRow,
              "Hips",
              `${r.hips_in_display}"`,
              isHipsMatch ? "match-hips" : "",
            );
          }
          if (r.waist_in && r.waist_in.toString().toLowerCase() !== "unknown") {
            const isWaistMatch =
              normalizedSearchWaist !== null &&
              normalizedRowWaist !== null &&
              normalizedSearchWaist === normalizedRowWaist;
            appendMetaPill(
              summaryRow,
              "Waist",
              `${r.waist_in}"`,
              isWaistMatch ? "match-waist" : "",
            );
          }

          [primaryRow, summaryRow].forEach((row) => {
            if (row.childNodes.length > 0) {
              meta.appendChild(row);
            }
          });

          // Report button + dropdown
          const reportBtn = document.createElement("button");
          reportBtn.className = "report-btn";
          reportBtn.textContent = "🚩";
          reportBtn.title = "Report this image";

          const reportDropdown = document.createElement("div");
          reportDropdown.className = "report-dropdown";

          const reportHeader = document.createElement("div");
          reportHeader.className = "report-dropdown-header";
          reportHeader.textContent = "Something wrong with this image?";
          reportDropdown.appendChild(reportHeader);

          const reportReasons = [
            { value: "duplicate_image", label: "Duplicate image" },
            { value: "incorrect_data", label: "Incorrect measurements/category/size" },
            { value: "image_not_helpful", label: "Image not helpful" },
            { value: "dead_link", label: "Dead link" },
            { value: "sold_out", label: "Sold out" },
            { value: "other_link_problem", label: "Other link problem" },
          ];

          for (const reason of reportReasons) {
            const reasonBtn = document.createElement("button");
            reasonBtn.textContent = reason.label;
            reasonBtn.addEventListener("click", async (e) => {
              e.preventDefault();
              e.stopPropagation();
              const { error: reportError } = await sb.from("image_reports").insert({
                image_id: r.id,
                reason: reason.value,
                anon_id: FWM_ANON_ID,
              });
              if (reportError) {
                console.error("image_reports insert error:", reportError);
                return;
              }
              reportDropdown.classList.remove("open");
              const thanks = document.createElement("div");
              thanks.className = "report-thanks";
              thanks.textContent = "Thanks for the report!";
              a.appendChild(thanks);
              setTimeout(() => {
                a.classList.add("fading-out");
                a.addEventListener("transitionend", () => a.remove(), { once: true });
              }, 800);
            });
            reportDropdown.appendChild(reasonBtn);
          }

          reportBtn.addEventListener("click", (e) => {
            e.preventDefault();
            e.stopPropagation();
            const isOpen = reportDropdown.classList.contains("open");
            document.querySelectorAll(".report-dropdown.open").forEach((d) => d.classList.remove("open"));
            if (!isOpen) reportDropdown.classList.add("open");
          });

          a.appendChild(img);
          a.appendChild(meta);
          a.appendChild(reportBtn);
          a.appendChild(reportDropdown);
          out.appendChild(a);

          const impressionKey = [
            currentSearchEventId || "random",
            r.id,
            cardPosition,
          ].join(":");
          if (!trackedProductCardImpressions.has(impressionKey)) {
            trackedProductCardImpressions.add(impressionKey);
            impressionEvents.push(
              buildProductCardEvent("impression", r, productUrl, cardPosition),
            );
          }

          registerProductCardView(a, r, productUrl, cardPosition);
        }

        if (impressionEvents.length > 0) {
          sb.from("product_card_events")
            .insert(impressionEvents)
            .then(({ error }) => {
              if (error) {
                console.error("product_card_events impression insert error:", error);
              }
            });
        }

        console.log(`RESULT: Displayed ${displayed} cards, skipped ${skipped}`);
      }

      function buildProductCardEvent(eventType, row, productUrl, cardPosition) {
        return {
          event_type: eventType,
          image_id: row.id || null,
          search_event_id: currentSearchEventId,
          anon_id: FWM_ANON_ID,
          session_id: FWM_SESSION_ID,
          page_url: window.location.href,
          product_url: productUrl || null,
          source_site_display: row.source_site_display || null,
          card_position: cardPosition,
          result_context: currentSearchEventId ? "search" : "random",
        };
      }

      function trackProductCardEvent(eventType, row, productUrl, cardPosition) {
        trackProductCardEventPayload(
          buildProductCardEvent(eventType, row, productUrl, cardPosition),
        );
      }

      function trackProductCardEventPayload(payload) {
        sb.from("product_card_events")
          .insert(payload)
          .then(({ error }) => {
            if (error) {
              console.error(
                `product_card_events ${payload.event_type} insert error:`,
                error,
              );
            }
          });
      }

      function registerProductCardView(card, row, productUrl, cardPosition) {
        const viewKey = [
          currentSearchEventId || "random",
          row.id,
          cardPosition,
        ].join(":");
        if (trackedProductCardViews.has(viewKey)) return;

        const viewEvent = buildProductCardEvent("view", row, productUrl, cardPosition);
        if (!productCardViewObserver) {
          trackedProductCardViews.add(viewKey);
          trackProductCardEventPayload(viewEvent);
          return;
        }

        card.__fwmViewEvent = viewEvent;
        card.__fwmViewKey = viewKey;
        productCardViewObserver.observe(card);
      }

      function getProductUrl(row) {
        const config = getSovrnCommerceConfig();
        if (config.preferPlainProductUrls && row.product_page_url_display) {
          return row.product_page_url_display;
        }
        return row.monetized_product_url_display || row.product_page_url_display;
      }

      function maybeOpenWithSovrn(event, url, target) {
        const config = getSovrnCommerceConfig();
        if (
          !url ||
          !config.enabled ||
          !config.useDynamicOpen ||
          event.button !== 0 ||
          event.metaKey ||
          event.ctrlKey ||
          event.shiftKey ||
          event.altKey ||
          !window.vglnk ||
          typeof window.vglnk.open !== "function"
        ) {
          return;
        }

        event.preventDefault();
        window.vglnk.open(url, target || "_blank");
      }

      function num(v) {
        if (v === "" || v === null || v === undefined) return null;
        const n = Number(v);
        return Number.isFinite(n) ? n : null;
      }

      document.addEventListener("click", () => {
        document.querySelectorAll(".report-dropdown.open").forEach((d) => d.classList.remove("open"));
      });
    </script>
  </body>
</html>
