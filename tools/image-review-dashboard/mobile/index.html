<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FWM Mobile Image Review</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="mode-swipe">
    <header class="topbar">
      <div>
        <h1>Image Review</h1>
        <p id="bundle-summary">Opening local review file...</p>
      </div>
      <button id="export-btn" type="button">Export</button>
    </header>

    <section class="toolbar" aria-label="Review tools">
      <label class="bucket-control compact-control">
        Set
        <select id="bucket-select"></select>
      </label>
      <label class="batch-control compact-control">
        Batch
        <select id="batch-select"></select>
      </label>
      <div class="segmented click-mode-control" aria-label="Click mode">
        <button type="button" data-click-mode="inspect" class="active">Inspect</button>
        <button type="button" data-click-mode="approve">Approve</button>
        <button type="button" data-click-mode="reject">Reject</button>
      </div>
      <div class="segmented view-mode-control" aria-label="View mode">
        <button id="view-mode-grid" type="button">Grid</button>
        <button id="view-mode-swipe" type="button" class="active">Swipe</button>
      </div>
      <details class="advanced-tools">
        <summary>Filters & bulk</summary>
        <div class="advanced-grid">
          <label>
            Reason
            <select id="reason-filter"></select>
          </label>
          <label>
            State
            <select id="state-filter">
              <option value="">All</option>
              <option value="NEUTRAL" selected>Neutral</option>
              <option value="APPROVE">Approved</option>
              <option value="DISAPPROVE">Rejected</option>
              <option value="dirty">Changed</option>
            </select>
          </label>
          <label>
            Reject with
            <select id="reject-reason"></select>
          </label>
          <label class="check"><input id="hide-duplicates" type="checkbox" checked /> Hide duplicates</label>
          <label class="check"><input id="show-reasons" type="checkbox" checked /> Show reasons</label>
          <button id="approve-visible" type="button">Approve visible unmarked</button>
          <button id="reject-visible" type="button">Reject visible unmarked</button>
        </div>
      </details>
      <p id="status">0 visible</p>
    </section>

    <main>
      <div id="legend" class="legend"></div>
      <section id="swipe-view" class="swipe-view" hidden>
        <div class="swipe-progress">
          <strong id="swipe-counter">0 / 0</strong>
          <span id="swipe-state">Swipe right approve, left reject</span>
        </div>
        <div id="swipe-deck" class="swipe-deck"></div>
        <div class="swipe-actions">
          <button id="swipe-reject" type="button">Reject</button>
          <button id="swipe-undo" type="button">Back</button>
          <button id="swipe-skip" type="button">Skip</button>
          <button id="swipe-approve" type="button">Approve</button>
        </div>
      </section>
      <div id="grid" class="grid"></div>
    </main>

    <dialog id="detail-dialog">
      <form method="dialog">
        <button class="close" value="close" aria-label="Close">x</button>
      </form>
      <img id="detail-image" alt="" />
      <div class="detail-body">
        <h2 id="detail-title">Review image</h2>
        <p id="detail-subtitle"></p>
        <div class="detail-actions">
          <button id="detail-approve" type="button">Approve</button>
          <button id="detail-reject" type="button">Reject</button>
          <button id="detail-neutral" type="button">Neutral</button>
        </div>
        <label>
          Rejection reason
          <select id="detail-reject-reason"></select>
        </label>
        <label>
          Comment
          <textarea id="detail-notes" rows="4"></textarea>
        </label>
        <button id="detail-save" type="button">Save comment/state</button>
        <dl id="detail-meta"></dl>
      </div>
    </dialog>

    <button id="top-btn" class="top-jump" type="button">Top</button>

    <script src="./bundle-data.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
